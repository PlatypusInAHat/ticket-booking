name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - dev
      - staging
      - prod
    tags:
      - 'v*'
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-cd.yml'
  pull_request:
    branches:
      - main
      - dev
      - staging
      - prod
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-cd.yml'
  workflow_dispatch:

jobs:
  resolve-deploy-target:
    name: 01 / Resolve Deploy Target
    runs-on: ubuntu-latest
    outputs:
      deploy_allowed: ${{ steps.target.outputs.deploy_allowed }}
      deploy_env: ${{ steps.target.outputs.deploy_env }}
      deploy_channel: ${{ steps.target.outputs.deploy_channel }}
      image_tag: ${{ steps.target.outputs.image_tag }}
      short_sha: ${{ steps.target.outputs.short_sha }}
      safe_ref: ${{ steps.target.outputs.safe_ref }}
    steps:
      - name: Resolve branch, tag, and image metadata
        id: target
        run: |
          set -euo pipefail

          deploy_allowed="true"
          deploy_env=""
          deploy_channel="branch"
          short_sha="${GITHUB_SHA::12}"
          safe_ref="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g')"

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            deploy_allowed="false"
            deploy_env="preview"
            deploy_channel="pull_request"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            deploy_env="prod"
            deploy_channel="release"
          else
            case "${GITHUB_REF_NAME}" in
              dev)
                deploy_env="dev"
                ;;
              staging)
                deploy_env="staging"
                ;;
              main|prod)
                deploy_env="prod"
                ;;
              *)
                deploy_allowed="false"
                deploy_env="none"
                ;;
            esac
          fi

          image_tag="${deploy_env}-${short_sha}"

          {
            echo "deploy_allowed=${deploy_allowed}"
            echo "deploy_env=${deploy_env}"
            echo "deploy_channel=${deploy_channel}"
            echo "image_tag=${image_tag}"
            echo "short_sha=${short_sha}"
            echo "safe_ref=${safe_ref}"
          } >> "$GITHUB_OUTPUT"

  frontend-quality-build:
    name: 02 / Frontend Install, Audit & Build
    runs-on: ubuntu-latest
    needs: resolve-deploy-target
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: NPM Audit
        run: npm audit --audit-level=high

      - name: Build Frontend
        env:
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY || '' }}
        run: npm run build

      - name: Upload Frontend Dist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  frontend-image-build:
    name: 03 / Build Frontend Image
    runs-on: ubuntu-latest
    needs:
      - resolve-deploy-target
      - frontend-quality-build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Frontend Docker Image
        working-directory: frontend
        env:
          IMAGE_TAG: ${{ needs.resolve-deploy-target.outputs.image_tag }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY || '' }}
        run: |
          set -euo pipefail

          docker build \
            --pull \
            --build-arg "VITE_TURNSTILE_SITE_KEY=${VITE_TURNSTILE_SITE_KEY}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${IMAGE_TAG}" \
            -t "ticketstage-frontend:${IMAGE_TAG}" \
            -t ticketstage-frontend:audit .

      - name: Save Frontend Image Artifact
        run: docker save ticketstage-frontend:audit -o frontend-image.tar

      - name: Upload Frontend Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend-image.tar
          retention-days: 1

  frontend-image-scan:
    name: 04 / Scan Frontend Image
    runs-on: ubuntu-latest
    needs:
      - resolve-deploy-target
      - frontend-image-build
    steps:
      - name: Download Frontend Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-image

      - name: Load Frontend Image
        run: docker load -i frontend-image.tar

      - name: Trivy Frontend Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ticketstage-frontend:audit
          scanners: vuln
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

  frontend-image-push:
    name: 05 / Push Frontend Image
    runs-on: ubuntu-latest
    needs:
      - resolve-deploy-target
      - frontend-image-scan
    if: github.event_name != 'pull_request' && needs.resolve-deploy-target.outputs.deploy_allowed == 'true'
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Download Frontend Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-image

      - name: Load Frontend Image
        run: docker load -i frontend-image.tar

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and Push Frontend Image
        id: meta
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.FRONTEND_ECR_REPOSITORY }}
          IMAGE_TAG: ${{ needs.resolve-deploy-target.outputs.image_tag }}
          SAFE_REF: ${{ needs.resolve-deploy-target.outputs.safe_ref }}
          SHORT_SHA: ${{ needs.resolve-deploy-target.outputs.short_sha }}
          DEPLOY_ENV: ${{ needs.resolve-deploy-target.outputs.deploy_env }}
        run: |
          set -euo pipefail

          if [ -z "${ECR_REPOSITORY}" ]; then
            echo "Missing required GitHub secret: FRONTEND_ECR_REPOSITORY"
            exit 1
          fi

          image_uri="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          tags=(
            "${image_uri}:${IMAGE_TAG}"
            "${image_uri}:sha-${SHORT_SHA}"
          )

          if [[ "${SAFE_REF}" != "${DEPLOY_ENV}" ]]; then
            tags+=("${image_uri}:${SAFE_REF}-${SHORT_SHA}")
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            tags+=("${image_uri}:${GITHUB_REF_NAME}")
          fi

          for tag in "${tags[@]}"; do
            docker tag "ticketstage-frontend:audit" "$tag"
            docker push "$tag"
          done

          {
            echo "image_uri=${image_uri}"
            echo "image_tag=${IMAGE_TAG}"
          } >> "$GITHUB_OUTPUT"

  frontend-deploy:
    name: 06 / Deploy Frontend To S3
    runs-on: ubuntu-latest
    needs:
      - resolve-deploy-target
      - frontend-quality-build
      - frontend-image-push
    if: github.event_name != 'pull_request' && needs.resolve-deploy-target.outputs.deploy_allowed == 'true'
    concurrency:
      group: frontend-deploy-${{ github.ref_name }}
      cancel-in-progress: true
    env:
      DEPLOY_ENV: ${{ needs.resolve-deploy-target.outputs.deploy_env }}
      DEPLOY_CHANNEL: ${{ needs.resolve-deploy-target.outputs.deploy_channel }}
      DEV_FRONTEND_S3_BUCKET: ${{ secrets.DEV_FRONTEND_S3_BUCKET }}
      STAGING_FRONTEND_S3_BUCKET: ${{ secrets.STAGING_FRONTEND_S3_BUCKET }}
      PROD_FRONTEND_S3_BUCKET: ${{ secrets.PROD_FRONTEND_S3_BUCKET }}
      FRONTEND_S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
      DEV_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }}
      STAGING_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.STAGING_CLOUDFRONT_DISTRIBUTION_ID }}
      PROD_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.PROD_CLOUDFRONT_DISTRIBUTION_ID }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - name: Download Frontend Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          set -euo pipefail

          bucket="${FRONTEND_S3_BUCKET}"
          case "${DEPLOY_ENV}" in
            dev)
              bucket="${DEV_FRONTEND_S3_BUCKET:-$bucket}"
              ;;
            staging)
              bucket="${STAGING_FRONTEND_S3_BUCKET:-$bucket}"
              ;;
            prod)
              bucket="${PROD_FRONTEND_S3_BUCKET:-$bucket}"
              ;;
          esac

          if [ -z "$bucket" ]; then
            echo "Missing frontend S3 bucket secret for DEPLOY_ENV=${DEPLOY_ENV}"
            exit 1
          fi

          echo "Deploying frontend channel=${DEPLOY_CHANNEL} env=${DEPLOY_ENV} to s3://${bucket}"
          aws s3 sync dist/ "s3://${bucket}" --delete

      - name: Invalidate CloudFront Cache
        run: |
          set -euo pipefail

          distribution_id="${CLOUDFRONT_DISTRIBUTION_ID}"
          case "${DEPLOY_ENV}" in
            dev)
              distribution_id="${DEV_CLOUDFRONT_DISTRIBUTION_ID:-$distribution_id}"
              ;;
            staging)
              distribution_id="${STAGING_CLOUDFRONT_DISTRIBUTION_ID:-$distribution_id}"
              ;;
            prod)
              distribution_id="${PROD_CLOUDFRONT_DISTRIBUTION_ID:-$distribution_id}"
              ;;
          esac

          if [ -z "$distribution_id" ]; then
            echo "No CloudFront distribution configured for DEPLOY_ENV=${DEPLOY_ENV}; skipping invalidation."
            exit 0
          fi

          aws cloudfront create-invalidation \
            --distribution-id "$distribution_id" \
            --paths "/*"
