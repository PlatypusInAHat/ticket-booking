name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - dev
      - staging
      - prod
    tags:
      - 'v*'
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-cd.yml'
  pull_request:
    branches:
      - main
      - dev
      - staging
      - prod
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-cd.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: frontend-${{ github.ref_name }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Resolve deployment target
        id: deploy-target
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail

          deploy_allowed="true"
          deploy_env=""
          deploy_channel="branch"

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            deploy_env="prod"
            deploy_channel="release"
          else
            case "${GITHUB_REF_NAME}" in
              dev)
                deploy_env="dev"
                ;;
              staging)
                deploy_env="staging"
                ;;
              main|prod)
                deploy_env="prod"
                ;;
              *)
                deploy_allowed="false"
                ;;
            esac
          fi

          {
            echo "DEPLOY_ALLOWED=${deploy_allowed}"
            echo "DEPLOY_ENV=${deploy_env}"
            echo "DEPLOY_CHANNEL=${deploy_channel}"
          } >> "$GITHUB_ENV"
          {
            echo "deploy_allowed=${deploy_allowed}"
            echo "deploy_env=${deploy_env}"
            echo "deploy_channel=${deploy_channel}"
          } >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        if: github.event_name != 'pull_request' && steps.deploy-target.outputs.deploy_allowed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request' && steps.deploy-target.outputs.deploy_allowed == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Prepare Docker image tags
        if: github.event_name != 'pull_request' && steps.deploy-target.outputs.deploy_allowed == 'true'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.FRONTEND_ECR_REPOSITORY }}
        run: |
          set -euo pipefail

          if [ -z "${ECR_REPOSITORY}" ]; then
            echo "Missing required GitHub secret: FRONTEND_ECR_REPOSITORY"
            exit 1
          fi

          short_sha="${GITHUB_SHA::12}"
          safe_ref="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g')"
          image_uri="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          primary_tag="${DEPLOY_ENV}-${short_sha}"

          {
            echo "IMAGE_URI=${image_uri}"
            echo "IMAGE_TAG=${primary_tag}"
            echo "IMAGE_TAGS<<EOF"
            echo "${image_uri}:${primary_tag}"
            if [[ "${safe_ref}" != "${DEPLOY_ENV}" ]]; then
              echo "${image_uri}:${safe_ref}-${short_sha}"
            fi
            echo "${image_uri}:sha-${short_sha}"
            if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
              echo "${image_uri}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Build and push Docker image to ECR
        if: github.event_name != 'pull_request' && steps.deploy-target.outputs.deploy_allowed == 'true'
        run: |
          set -euo pipefail

          build_args=()
          while IFS= read -r tag; do
            build_args+=("-t" "$tag")
          done <<< "$IMAGE_TAGS"

          docker build \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${IMAGE_TAG}" \
            "${build_args[@]}" .

          while IFS= read -r tag; do
            docker push "$tag"
          done <<< "$IMAGE_TAGS"

      - name: Deploy to S3
        if: github.event_name != 'pull_request' && steps.deploy-target.outputs.deploy_allowed == 'true'
        env:
          DEV_FRONTEND_S3_BUCKET: ${{ secrets.DEV_FRONTEND_S3_BUCKET }}
          STAGING_FRONTEND_S3_BUCKET: ${{ secrets.STAGING_FRONTEND_S3_BUCKET }}
          PROD_FRONTEND_S3_BUCKET: ${{ secrets.PROD_FRONTEND_S3_BUCKET }}
          FRONTEND_S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
        run: |
          set -euo pipefail

          bucket="${FRONTEND_S3_BUCKET}"
          case "${DEPLOY_ENV}" in
            dev)
              bucket="${DEV_FRONTEND_S3_BUCKET:-$bucket}"
              ;;
            staging)
              bucket="${STAGING_FRONTEND_S3_BUCKET:-$bucket}"
              ;;
            prod)
              bucket="${PROD_FRONTEND_S3_BUCKET:-$bucket}"
              ;;
          esac

          if [ -z "$bucket" ]; then
            echo "Missing frontend S3 bucket secret for DEPLOY_ENV=${DEPLOY_ENV}"
            exit 1
          fi

          echo "Deploying frontend channel=${DEPLOY_CHANNEL} env=${DEPLOY_ENV} to s3://${bucket}"
          aws s3 sync dist/ "s3://${bucket}" --delete

      - name: Invalidate CloudFront Cache
        if: github.event_name != 'pull_request' && steps.deploy-target.outputs.deploy_allowed == 'true'
        env:
          DEV_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }}
          STAGING_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.STAGING_CLOUDFRONT_DISTRIBUTION_ID }}
          PROD_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.PROD_CLOUDFRONT_DISTRIBUTION_ID }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail

          distribution_id="${CLOUDFRONT_DISTRIBUTION_ID}"
          case "${DEPLOY_ENV}" in
            dev)
              distribution_id="${DEV_CLOUDFRONT_DISTRIBUTION_ID:-$distribution_id}"
              ;;
            staging)
              distribution_id="${STAGING_CLOUDFRONT_DISTRIBUTION_ID:-$distribution_id}"
              ;;
            prod)
              distribution_id="${PROD_CLOUDFRONT_DISTRIBUTION_ID:-$distribution_id}"
              ;;
          esac

          if [ -z "$distribution_id" ]; then
            echo "No CloudFront distribution configured for DEPLOY_ENV=${DEPLOY_ENV}; skipping invalidation."
            exit 0
          fi

          aws cloudfront create-invalidation \
            --distribution-id "$distribution_id" \
            --paths "/*"
