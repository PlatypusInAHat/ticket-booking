name: Backend CI/CD

on:
  push:
    branches:
      - main
      - dev
      - staging
      - prod
    tags:
      - 'v*'
    paths:
      - 'backend/**'
      - '.github/workflows/backend-cd.yml'
  pull_request:
    branches:
      - main
      - dev
      - staging
      - prod
    paths:
      - 'backend/**'
      - '.github/workflows/backend-cd.yml'
  workflow_dispatch:

jobs:
  resolve-deploy-target:
    name: 01 / Resolve Deploy Target
    runs-on: ubuntu-latest
    outputs:
      deploy_allowed: ${{ steps.target.outputs.deploy_allowed }}
      deploy_env: ${{ steps.target.outputs.deploy_env }}
      deploy_channel: ${{ steps.target.outputs.deploy_channel }}
      image_tag: ${{ steps.target.outputs.image_tag }}
      short_sha: ${{ steps.target.outputs.short_sha }}
      safe_ref: ${{ steps.target.outputs.safe_ref }}
    steps:
      - name: Resolve branch, tag, and image metadata
        id: target
        run: |
          set -euo pipefail

          deploy_allowed="true"
          deploy_env=""
          deploy_channel="branch"
          short_sha="${GITHUB_SHA::12}"
          safe_ref="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g')"

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            deploy_allowed="false"
            deploy_env="preview"
            deploy_channel="pull_request"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            deploy_env="prod"
            deploy_channel="release"
          else
            case "${GITHUB_REF_NAME}" in
              dev)
                deploy_env="dev"
                ;;
              staging)
                deploy_env="staging"
                ;;
              main|prod)
                deploy_env="prod"
                ;;
              *)
                deploy_allowed="false"
                deploy_env="none"
                ;;
            esac
          fi

          image_tag="${deploy_env}-${short_sha}"

          {
            echo "deploy_allowed=${deploy_allowed}"
            echo "deploy_env=${deploy_env}"
            echo "deploy_channel=${deploy_channel}"
            echo "image_tag=${image_tag}"
            echo "short_sha=${short_sha}"
            echo "safe_ref=${safe_ref}"
          } >> "$GITHUB_OUTPUT"

  backend-quality:
    name: 02 / Backend Install, Audit & Test
    runs-on: ubuntu-latest
    needs: resolve-deploy-target
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: NPM Audit
        run: npm audit --audit-level=high

      - name: Run Tests
        run: npm test

  backend-image-build:
    name: 03 / Build Backend Image
    runs-on: ubuntu-latest
    needs:
      - resolve-deploy-target
      - backend-quality
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        working-directory: backend
        env:
          IMAGE_TAG: ${{ needs.resolve-deploy-target.outputs.image_tag }}
        run: |
          set -euo pipefail

          docker build \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${IMAGE_TAG}" \
            -t ticket-booking-backend:${IMAGE_TAG} \
            -t ticket-booking-backend:audit .

      - name: Save Backend Image Artifact
        run: docker save ticket-booking-backend:audit -o backend-image.tar

      - name: Upload Backend Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend-image.tar
          retention-days: 1

  backend-image-scan:
    name: 04 / Scan Backend Image
    runs-on: ubuntu-latest
    needs:
      - resolve-deploy-target
      - backend-image-build
    steps:
      - name: Download Backend Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image

      - name: Load Backend Image
        run: docker load -i backend-image.tar

      - name: Trivy Backend Image Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ticket-booking-backend:audit
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

  backend-image-push:
    name: 05 / Push Backend Image
    runs-on: ubuntu-latest
    needs:
      - resolve-deploy-target
      - backend-image-scan
    if: github.event_name != 'pull_request' && needs.resolve-deploy-target.outputs.deploy_allowed == 'true'
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Download Backend Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image

      - name: Load Backend Image
        run: docker load -i backend-image.tar

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and Push Backend Image
        id: meta
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.BACKEND_ECR_REPOSITORY }}
          IMAGE_TAG: ${{ needs.resolve-deploy-target.outputs.image_tag }}
          SAFE_REF: ${{ needs.resolve-deploy-target.outputs.safe_ref }}
          SHORT_SHA: ${{ needs.resolve-deploy-target.outputs.short_sha }}
          DEPLOY_ENV: ${{ needs.resolve-deploy-target.outputs.deploy_env }}
        run: |
          set -euo pipefail

          if [ -z "${ECR_REPOSITORY}" ]; then
            echo "Missing required GitHub secret: BACKEND_ECR_REPOSITORY"
            exit 1
          fi

          image_uri="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          tags=(
            "${image_uri}:${IMAGE_TAG}"
            "${image_uri}:sha-${SHORT_SHA}"
          )

          if [[ "${SAFE_REF}" != "${DEPLOY_ENV}" ]]; then
            tags+=("${image_uri}:${SAFE_REF}-${SHORT_SHA}")
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            tags+=("${image_uri}:${GITHUB_REF_NAME}")
          fi

          for tag in "${tags[@]}"; do
            docker tag "ticket-booking-backend:audit" "$tag"
            docker push "$tag"
          done

          {
            echo "image_uri=${image_uri}"
            echo "image_tag=${IMAGE_TAG}"
          } >> "$GITHUB_OUTPUT"

  backend-deploy:
    name: 06 / Deploy Backend To EKS
    runs-on: ubuntu-latest
    needs:
      - resolve-deploy-target
      - backend-image-push
    if: github.event_name != 'pull_request' && needs.resolve-deploy-target.outputs.deploy_allowed == 'true'
    concurrency:
      group: backend-deploy-${{ github.ref_name }}
      cancel-in-progress: true
    env:
      K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE || 'ticketstage' }}
      IMAGE_URI: ${{ needs.backend-image-push.outputs.image_uri }}
      IMAGE_TAG: ${{ needs.backend-image-push.outputs.image_tag }}
      DEPLOY_ENV: ${{ needs.resolve-deploy-target.outputs.deploy_env }}
      DEPLOY_CHANNEL: ${{ needs.resolve-deploy-target.outputs.deploy_channel }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Deploy Backend Services
        run: |
          set -euo pipefail

          echo "Deploying backend channel=${DEPLOY_CHANNEL} env=${DEPLOY_ENV} image=${IMAGE_URI}:${IMAGE_TAG}"

          services=("api-gateway" "auth-service" "booking-service" "catalog-service" "checkin-service" "notification-service")

          for service in "${services[@]}"; do
            echo "Updating deployment for ${service} to ${IMAGE_URI}:${IMAGE_TAG}..."
            kubectl -n "$K8S_NAMESPACE" set image "deployment/${service}" "${service}=${IMAGE_URI}:${IMAGE_TAG}"
            if ! kubectl -n "$K8S_NAMESPACE" rollout status "deployment/${service}" --timeout=180s; then
              echo "Rollout failed for ${service}. Rolling back to previous ReplicaSet..."
              kubectl -n "$K8S_NAMESPACE" rollout undo "deployment/${service}"
              kubectl -n "$K8S_NAMESPACE" rollout status "deployment/${service}" --timeout=180s
              exit 1
            fi
          done
