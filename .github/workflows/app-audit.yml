name: App Code Audit

on:
  push:
    branches:
      - main
      - dev
      - staging
      - prod
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'mobile/**'
      - 'docker-compose.yml'
      - 'sonar-project.properties'
      - 'dependency-check-suppressions.xml'
      - '.github/workflows/app-audit.yml'
  pull_request:
    branches:
      - main
      - dev
      - staging
      - prod
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'mobile/**'
      - 'docker-compose.yml'
      - 'sonar-project.properties'
      - 'dependency-check-suppressions.xml'
      - '.github/workflows/app-audit.yml'

jobs:
  workflow-lint:
    name: 01 / Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: GitHub Actions Lint
        uses: raven-actions/actionlint@v2

  backend-install-audit:
    name: 02 / Backend Install & NPM Audit
    runs-on: ubuntu-latest
    needs: workflow-lint
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: NPM Audit
        run: npm audit --audit-level=high

  backend-test:
    name: 03 / Backend Unit Tests
    runs-on: ubuntu-latest
    needs: backend-install-audit
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Backend Tests
        run: npm test

  frontend-install-audit:
    name: 02 / Frontend Install & NPM Audit
    runs-on: ubuntu-latest
    needs: workflow-lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: NPM Audit
        run: npm audit --audit-level=high

  frontend-build:
    name: 03 / Frontend Typecheck & Build
    runs-on: ubuntu-latest
    needs: frontend-install-audit
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

  mobile-install-audit:
    name: 02 / Mobile Install & NPM Audit
    runs-on: ubuntu-latest
    needs: workflow-lint
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: NPM Audit
        run: npm audit --audit-level=high

  mobile-expo-config:
    name: 03 / Mobile Expo Config
    runs-on: ubuntu-latest
    needs: mobile-install-audit
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Validate Expo Config
        run: npx expo config --type public >/dev/null

  secret-scan:
    name: 04 / Secret Scan
    runs-on: ubuntu-latest
    needs: workflow-lint
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-filesystem:
    name: 04 / Trivy Filesystem Scan
    runs-on: ubuntu-latest
    needs: workflow-lint
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-app-results.sarif
          exit-code: '1'
          severity: HIGH,CRITICAL
          skip-dirs: backend/node_modules,frontend/node_modules,mobile/node_modules

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-app-results.sarif

  backend-image-build:
    name: 04 / Backend Image Build
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t ticket-booking-backend:audit backend

      - name: Save Backend Image
        run: docker save ticket-booking-backend:audit -o backend-image.tar

      - name: Upload Backend Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend-image.tar
          retention-days: 1

  backend-image-scan:
    name: 05 / Trivy Backend Image Scan
    runs-on: ubuntu-latest
    needs: backend-image-build
    steps:
      - name: Download Backend Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image

      - name: Load Backend Image
        run: docker load -i backend-image.tar

      - name: Trivy Backend Image Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ticket-booking-backend:audit
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

  owasp-dependency-check:
    name: 05 / OWASP Dependency Check
    runs-on: ubuntu-latest
    needs:
      - backend-install-audit
      - frontend-install-audit
      - mobile-install-audit
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ticket-booking-app
          path: .
          format: HTML
          out: dependency-check-report
          args: >
            --enableExperimental
            --failOnCVSS 7
            --suppression dependency-check-suppressions.xml
            --exclude "**/node_modules/**"

      - name: Upload OWASP Dependency Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: dependency-check-report
          if-no-files-found: ignore

  sonarqube-scan:
    name: 06 / SonarQube Scan
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-build
      - mobile-expo-config
      - secret-scan
      - trivy-filesystem
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: Skip SonarQube
        if: env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == ''
        run: echo "SonarQube secrets are not configured; skipping scan."

  audit-summary:
    name: 07 / Audit Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend-test
      - frontend-build
      - mobile-expo-config
      - secret-scan
      - trivy-filesystem
      - backend-image-scan
      - owasp-dependency-check
      - sonarqube-scan
    steps:
      - name: Print Result Summary
        run: |
          echo "Backend tests: ${{ needs.backend-test.result }}"
          echo "Frontend build: ${{ needs.frontend-build.result }}"
          echo "Mobile Expo config: ${{ needs.mobile-expo-config.result }}"
          echo "Secret scan: ${{ needs.secret-scan.result }}"
          echo "Trivy filesystem: ${{ needs.trivy-filesystem.result }}"
          echo "Backend image scan: ${{ needs.backend-image-scan.result }}"
          echo "OWASP dependency check: ${{ needs.owasp-dependency-check.result }}"
          echo "SonarQube: ${{ needs.sonarqube-scan.result }}"

      - name: Fail If Required Stage Failed
        if: contains(join(needs.*.result, ','), 'failure') || contains(join(needs.*.result, ','), 'cancelled')
        run: |
          echo "One or more required audit stages failed."
          exit 1
