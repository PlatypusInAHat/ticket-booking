<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">TicketStage Delivery and Booking Flow</title>
  <desc id="desc">CI/CD deployment flow and high traffic ticket booking sequence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1115"/>
      <stop offset="100%" stop-color="#1d160c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe082"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d9c59a"/>
    </marker>
    <style>
      .title { font: 800 42px Arial, sans-serif; fill: #fff8e8; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #cdbf9d; }
      .section { font: 800 25px Arial, sans-serif; fill: #ffe082; }
      .box { fill: #24221c; stroke: #6d5b33; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .boxBlue { fill: #182331; stroke: #5378ae; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .boxGreen { fill: #172720; stroke: #4e8a68; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .boxRed { fill: #2a171b; stroke: #8e4854; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .label { font: 800 19px Arial, sans-serif; fill: #fff8e8; }
      .small { font: 500 14px Arial, sans-serif; fill: #d9c59a; }
      .line { stroke: #d9c59a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .deploy { stroke: #8bb1ff; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .booking { stroke: #70d6a3; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .note { fill: #1f1b13; stroke: #5d5136; stroke-width: 1.5; rx: 14; }
      .noteText { font: 600 13px Arial, sans-serif; fill: #cdbf9d; }
    </style>
  </defs>

  <rect width="1500" height="900" fill="url(#bg)"/>
  <circle cx="1300" cy="150" r="230" fill="#ffb347" opacity="0.08"/>
  <circle cx="170" cy="780" r="250" fill="#70d6a3" opacity="0.08"/>

  <text x="60" y="70" class="title">TicketStage Delivery and Booking Flow</text>
  <text x="62" y="106" class="subtitle">How code becomes running workloads, and how high-traffic ticket purchases are protected.</text>

  <text x="70" y="175" class="section">1. CI/CD + GitOps Deployment</text>
  <rect x="70" y="215" width="170" height="88" class="boxBlue"/>
  <text x="105" y="250" class="label">Push Code</text>
  <text x="105" y="277" class="small">dev / main</text>

  <rect x="300" y="215" width="190" height="88" class="boxBlue"/>
  <text x="333" y="250" class="label">Quality Gates</text>
  <text x="333" y="277" class="small">Test, audit, scan</text>

  <rect x="550" y="215" width="190" height="88" class="boxBlue"/>
  <text x="584" y="250" class="label">Build Images</text>
  <text x="584" y="277" class="small">Tagged Docker images</text>

  <rect x="800" y="215" width="190" height="88" class="boxBlue"/>
  <text x="852" y="250" class="label">Push ECR</text>
  <text x="834" y="277" class="small">AWS image registry</text>

  <rect x="1050" y="215" width="190" height="88" class="boxBlue"/>
  <text x="1080" y="250" class="label">Update Overlay</text>
  <text x="1080" y="277" class="small">Kustomize image tag</text>

  <rect x="1280" y="215" width="150" height="88" class="boxGreen"/>
  <text x="1312" y="250" class="label">Argo CD</text>
  <text x="1305" y="277" class="small">Sync to EKS</text>

  <path class="deploy" d="M240 259 H300"/>
  <path class="deploy" d="M490 259 H550"/>
  <path class="deploy" d="M740 259 H800"/>
  <path class="deploy" d="M990 259 H1050"/>
  <path class="deploy" d="M1240 259 H1280"/>

  <rect x="70" y="340" width="650" height="64" class="note"/>
  <text x="95" y="368" class="noteText">Dev: auto-sync + prune + self-heal from branch dev.</text>
  <text x="95" y="390" class="noteText">Prod: manual sync from branch main to avoid accidental rollout.</text>

  <text x="70" y="500" class="section">2. High-Traffic Ticket Booking</text>

  <rect x="70" y="545" width="150" height="82" class="box"/>
  <text x="108" y="578" class="label">User</text>
  <text x="95" y="605" class="small">Buy tickets</text>

  <rect x="280" y="545" width="170" height="82" class="box"/>
  <text x="308" y="578" class="label">Gateway</text>
  <text x="306" y="605" class="small">Auth + route</text>

  <rect x="510" y="545" width="190" height="82" class="boxGreen"/>
  <text x="536" y="578" class="label">Booking Service</text>
  <text x="544" y="605" class="small">Inventory hold</text>

  <rect x="760" y="545" width="190" height="82" class="boxRed"/>
  <text x="804" y="578" class="label">Queue Guard</text>
  <text x="790" y="605" class="small">Rate limit + queue</text>

  <rect x="1010" y="545" width="170" height="82" class="box"/>
  <text x="1044" y="578" class="label">Payment</text>
  <text x="1030" y="605" class="small">VNPay / MoMo</text>

  <rect x="1240" y="545" width="170" height="82" class="boxGreen"/>
  <text x="1264" y="578" class="label">Notification</text>
  <text x="1270" y="605" class="small">Email ticket</text>

  <rect x="510" y="720" width="190" height="82" class="box"/>
  <text x="552" y="753" class="label">Booking DB</text>
  <text x="558" y="780" class="small">Hold / confirm</text>

  <rect x="885" y="720" width="190" height="82" class="boxGreen"/>
  <text x="920" y="753" class="label">Event Broker</text>
  <text x="925" y="780" class="small">RabbitMQ events</text>

  <path class="booking" d="M220 586 H280"/>
  <path class="booking" d="M450 586 H510"/>
  <path class="booking" d="M700 586 H760"/>
  <path class="booking" d="M950 586 H1010"/>
  <path class="booking" d="M1180 586 H1240"/>
  <path class="booking" d="M605 627 V720"/>
  <path class="booking" d="M700 760 H885"/>
  <path class="booking" d="M1075 760 C1210 745 1275 690 1325 627"/>
  <path class="line" d="M1095 627 C1060 675 980 690 980 720"/>

  <rect x="70" y="715" width="300" height="88" class="note"/>
  <text x="95" y="744" class="noteText">Ticket inventory is held temporarily.</text>
  <text x="95" y="766" class="noteText">Expired holds are released by worker.</text>
  <text x="95" y="788" class="noteText">Payment webhook finalizes the booking.</text>

  <rect x="760" y="365" width="650" height="64" class="note"/>
  <text x="785" y="393" class="noteText">Security stages: code audit, dependency scan, image scan, IaC scan, then controlled deploy.</text>
  <text x="785" y="415" class="noteText">Runtime stages: Cloudflare + API rate limits + queue backpressure + HPA/KEDA scale out.</text>
</svg>
