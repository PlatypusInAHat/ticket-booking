services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  auth-mongo:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - auth-mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"try { rs.status().ok } catch (e) { rs.initiate({_id: 'rs0', members: [{ _id: 0, host: 'auth-mongo:27017' }] }).ok }\""]
      interval: 5s
      timeout: 10s
      retries: 30

  catalog-mongo:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27019:27017"
    volumes:
      - catalog-mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"try { rs.status().ok } catch (e) { rs.initiate({_id: 'rs0', members: [{ _id: 0, host: 'catalog-mongo:27017' }] }).ok }\""]
      interval: 5s
      timeout: 10s
      retries: 30

  booking-mongo:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27020:27017"
    volumes:
      - booking-mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"try { rs.status().ok } catch (e) { rs.initiate({_id: 'rs0', members: [{ _id: 0, host: 'booking-mongo:27017' }] }).ok }\""]
      interval: 5s
      timeout: 10s
      retries: 30

  checkin-mongo:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27021:27017"
    volumes:
      - checkin-mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"try { rs.status().ok } catch (e) { rs.initiate({_id: 'rs0', members: [{ _id: 0, host: 'checkin-mongo:27017' }] }).ok }\""]
      interval: 5s
      timeout: 10s
      retries: 30

  notification-mongo:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27022:27017"
    volumes:
      - notification-mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"try { rs.status().ok } catch (e) { rs.initiate({_id: 'rs0', members: [{ _id: 0, host: 'notification-mongo:27017' }] }).ok }\""]
      interval: 5s
      timeout: 10s
      retries: 30

  auth-service:
    build:
      context: ./backend
      dockerfile: services/auth/Dockerfile
    environment:
      NODE_ENV: development
      SERVICE_MODE: microservice
      SERVICE_NAME: auth-service
      AUTH_SERVICE_PORT: 5101
      AUTH_MONGODB_URI: mongodb://auth-mongo:27017/ticket-auth?replicaSet=rs0
      CATALOG_SERVICE_URL: http://catalog-service:5102
      BOOKING_SERVICE_URL: http://booking-service:5103
      CHECKIN_SERVICE_URL: http://checkin-service:5104
      EVENT_BROKER_URL: amqp://rabbitmq:5672
      EVENT_EXCHANGE: ticket-booking.events
      EVENT_IDEMPOTENCY_ENABLED: ${EVENT_IDEMPOTENCY_ENABLED:-true}
      EVENT_IDEMPOTENCY_PROCESSING_TIMEOUT_MS: ${EVENT_IDEMPOTENCY_PROCESSING_TIMEOUT_MS:-300000}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev_internal_key}
      SECRET_HASH_KEY: ${SECRET_HASH_KEY:-dev_secret_hash_key_change_me}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      JWT_ACCESS_EXPIRE: ${JWT_ACCESS_EXPIRE:-15m}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-24h}
      PASSWORD_HASH_ROUNDS: ${PASSWORD_HASH_ROUNDS:-12}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:-dev_password_pepper_change_me}
      MIN_PASSWORD_LENGTH: ${MIN_PASSWORD_LENGTH:-8}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ticketbooking.com}
    depends_on:
      - auth-mongo
      - rabbitmq
    ports:
      - "5101:5101"

  catalog-service:
    build:
      context: ./backend
      dockerfile: services/catalog/Dockerfile
    environment:
      NODE_ENV: development
      SERVICE_MODE: microservice
      SERVICE_NAME: catalog-service
      CATALOG_SERVICE_PORT: 5102
      CATALOG_MONGODB_URI: mongodb://catalog-mongo:27017/ticket-catalog?replicaSet=rs0
      EVENT_BROKER_URL: amqp://rabbitmq:5672
      EVENT_EXCHANGE: ticket-booking.events
      EVENT_IDEMPOTENCY_ENABLED: ${EVENT_IDEMPOTENCY_ENABLED:-true}
      EVENT_IDEMPOTENCY_PROCESSING_TIMEOUT_MS: ${EVENT_IDEMPOTENCY_PROCESSING_TIMEOUT_MS:-300000}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev_internal_key}
      SECRET_HASH_KEY: ${SECRET_HASH_KEY:-dev_secret_hash_key_change_me}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      JWT_ACCESS_EXPIRE: ${JWT_ACCESS_EXPIRE:-15m}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-24h}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      - catalog-mongo
      - rabbitmq
    ports:
      - "5102:5102"

  booking-service:
    build:
      context: ./backend
      dockerfile: services/booking/Dockerfile
    environment:
      NODE_ENV: development
      SERVICE_MODE: microservice
      SERVICE_NAME: booking-service
      BOOKING_SERVICE_PORT: 5103
      BOOKING_MONGODB_URI: mongodb://booking-mongo:27017/ticket-booking?replicaSet=rs0
      CATALOG_SERVICE_URL: http://catalog-service:5102
      EVENT_BROKER_URL: amqp://rabbitmq:5672
      EVENT_EXCHANGE: ticket-booking.events
      EVENT_IDEMPOTENCY_ENABLED: ${EVENT_IDEMPOTENCY_ENABLED:-true}
      EVENT_IDEMPOTENCY_PROCESSING_TIMEOUT_MS: ${EVENT_IDEMPOTENCY_PROCESSING_TIMEOUT_MS:-300000}
      OUTBOX_ENABLED: ${OUTBOX_ENABLED:-true}
      OUTBOX_PUBLISH_INTERVAL_MS: ${OUTBOX_PUBLISH_INTERVAL_MS:-5000}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-50}
      INTERNAL_HTTP_TIMEOUT_MS: ${INTERNAL_HTTP_TIMEOUT_MS:-5000}
      INTERNAL_HTTP_RETRIES: ${INTERNAL_HTTP_RETRIES:-2}
      INTERNAL_HTTP_RETRY_DELAY_MS: ${INTERNAL_HTTP_RETRY_DELAY_MS:-250}
      INTERNAL_HTTP_CIRCUIT_BREAKER_THRESHOLD: ${INTERNAL_HTTP_CIRCUIT_BREAKER_THRESHOLD:-5}
      INTERNAL_HTTP_CIRCUIT_BREAKER_COOLDOWN_MS: ${INTERNAL_HTTP_CIRCUIT_BREAKER_COOLDOWN_MS:-15000}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev_internal_key}
      SECRET_HASH_KEY: ${SECRET_HASH_KEY:-dev_secret_hash_key_change_me}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      JWT_ACCESS_EXPIRE: ${JWT_ACCESS_EXPIRE:-15m}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-24h}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:5000}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-vnpay_placeholder}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-vnpay_secret_placeholder}
      VNPAY_PAYMENT_URL: ${VNPAY_PAYMENT_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-http://localhost:5000/api/payment/return/vnpay}
      VNPAY_IPN_URL: ${VNPAY_IPN_URL:-http://localhost:5000/api/payment/webhooks/vnpay}
      MOMO_ENDPOINT: ${MOMO_ENDPOINT:-https://test-payment.momo.vn/v2/gateway/api/create}
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE:-momo_placeholder}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY:-momo_access_placeholder}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY:-momo_secret_placeholder}
      MOMO_REDIRECT_URL: ${MOMO_REDIRECT_URL:-http://localhost:5173/payment/result}
      MOMO_IPN_URL: ${MOMO_IPN_URL:-http://localhost:5000/api/payment/webhooks/momo}
      MOMO_REQUEST_TYPE: ${MOMO_REQUEST_TYPE:-captureWallet}
      BOOKING_HOLD_MINUTES: ${BOOKING_HOLD_MINUTES:-15}
      BOOKING_EXPIRATION_INTERVAL_MS: ${BOOKING_EXPIRATION_INTERVAL_MS:-30000}
      BOOKING_EXPIRATION_BATCH_SIZE: ${BOOKING_EXPIRATION_BATCH_SIZE:-50}
      EVENT_REMINDER_WORKER_ENABLED: ${EVENT_REMINDER_WORKER_ENABLED:-true}
      EVENT_REMINDER_INTERVAL_MS: ${EVENT_REMINDER_INTERVAL_MS:-900000}
      EVENT_REMINDER_WINDOW_HOURS: ${EVENT_REMINDER_WINDOW_HOURS:-24}
      EVENT_REMINDER_BATCH_SIZE: ${EVENT_REMINDER_BATCH_SIZE:-50}
      BOOKING_QUEUE_ENABLED: ${BOOKING_QUEUE_ENABLED:-true}
      BOOKING_QUEUE_CONCURRENCY: ${BOOKING_QUEUE_CONCURRENCY:-5}
      BOOKING_QUEUE_MAX_SIZE: ${BOOKING_QUEUE_MAX_SIZE:-500}
      BOOKING_QUEUE_WAIT_TIMEOUT_MS: ${BOOKING_QUEUE_WAIT_TIMEOUT_MS:-30000}
      BOOKING_QUEUE_LEASE_MS: ${BOOKING_QUEUE_LEASE_MS:-300000}
      BOOKING_QUEUE_STORE: ${BOOKING_QUEUE_STORE:-mongo}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_STORE: ${RATE_LIMIT_STORE:-mongo}
      BOOKING_CREATE_RATE_LIMIT_WINDOW_MS: ${BOOKING_CREATE_RATE_LIMIT_WINDOW_MS:-60000}
      BOOKING_CREATE_RATE_LIMIT_MAX: ${BOOKING_CREATE_RATE_LIMIT_MAX:-8}
      PAYMENT_RATE_LIMIT_WINDOW_MS: ${PAYMENT_RATE_LIMIT_WINDOW_MS:-60000}
      PAYMENT_RATE_LIMIT_MAX: ${PAYMENT_RATE_LIMIT_MAX:-12}
      PURCHASE_LIMIT_ENABLED: ${PURCHASE_LIMIT_ENABLED:-true}
      PURCHASE_LIMIT_WINDOW_MS: ${PURCHASE_LIMIT_WINDOW_MS:-86400000}
      PURCHASE_LIMIT_MAX_TICKETS_PER_EVENT: ${PURCHASE_LIMIT_MAX_TICKETS_PER_EVENT:-10}
      TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:-false}
      TURNSTILE_PROTECTED_SOURCES: ${TURNSTILE_PROTECTED_SOURCES:-web}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      DEVICE_FINGERPRINT_SECRET: ${DEVICE_FINGERPRINT_SECRET:-dev_device_fingerprint_secret_change_me}
      BOT_RISK_BLOCK_THRESHOLD: ${BOT_RISK_BLOCK_THRESHOLD:-90}
    depends_on:
      - booking-mongo
      - catalog-service
      - rabbitmq
    ports:
      - "5103:5103"

  checkin-service:
    build:
      context: ./backend
      dockerfile: services/checkin/Dockerfile
    environment:
      NODE_ENV: development
      SERVICE_MODE: microservice
      SERVICE_NAME: checkin-service
      CHECKIN_SERVICE_PORT: 5104
      CHECKIN_MONGODB_URI: mongodb://checkin-mongo:27017/ticket-checkin?replicaSet=rs0
      EVENT_BROKER_URL: amqp://rabbitmq:5672
      EVENT_EXCHANGE: ticket-booking.events
      EVENT_IDEMPOTENCY_ENABLED: ${EVENT_IDEMPOTENCY_ENABLED:-true}
      EVENT_IDEMPOTENCY_PROCESSING_TIMEOUT_MS: ${EVENT_IDEMPOTENCY_PROCESSING_TIMEOUT_MS:-300000}
      OUTBOX_ENABLED: ${OUTBOX_ENABLED:-true}
      OUTBOX_PUBLISH_INTERVAL_MS: ${OUTBOX_PUBLISH_INTERVAL_MS:-5000}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-50}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev_internal_key}
      SECRET_HASH_KEY: ${SECRET_HASH_KEY:-dev_secret_hash_key_change_me}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      JWT_ACCESS_EXPIRE: ${JWT_ACCESS_EXPIRE:-15m}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-24h}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      - checkin-mongo
      - rabbitmq
    ports:
      - "5104:5104"

  notification-service:
    build:
      context: ./backend
      dockerfile: services/notification/Dockerfile
    environment:
      NODE_ENV: development
      SERVICE_MODE: microservice
      SERVICE_NAME: notification-service
      NOTIFICATION_SERVICE_PORT: 5105
      NOTIFICATION_MONGODB_URI: mongodb://notification-mongo:27017/ticket-notification?replicaSet=rs0
      EVENT_BROKER_URL: amqp://rabbitmq:5672
      EVENT_EXCHANGE: ticket-booking.events
      EVENT_IDEMPOTENCY_ENABLED: ${EVENT_IDEMPOTENCY_ENABLED:-true}
      EVENT_IDEMPOTENCY_PROCESSING_TIMEOUT_MS: ${EVENT_IDEMPOTENCY_PROCESSING_TIMEOUT_MS:-300000}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev_internal_key}
      SECRET_HASH_KEY: ${SECRET_HASH_KEY:-dev_secret_hash_key_change_me}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:5000}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@ticketstage.local}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-TicketStage}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      SES_SMTP_HOST: ${SES_SMTP_HOST:-}
      SES_SMTP_PORT: ${SES_SMTP_PORT:-587}
      SES_SMTP_USERNAME: ${SES_SMTP_USERNAME:-}
      SES_SMTP_PASSWORD: ${SES_SMTP_PASSWORD:-}
      EMAIL_WORKER_ENABLED: ${EMAIL_WORKER_ENABLED:-true}
      EMAIL_WORKER_INTERVAL_MS: ${EMAIL_WORKER_INTERVAL_MS:-5000}
      EMAIL_WORKER_BATCH_SIZE: ${EMAIL_WORKER_BATCH_SIZE:-10}
    depends_on:
      - notification-mongo
      - rabbitmq
    ports:
      - "5105:5105"

  api-gateway:
    build:
      context: ./backend
      dockerfile: services/api-gateway/Dockerfile
    environment:
      NODE_ENV: development
      SERVICE_MODE: microservice
      SERVICE_NAME: api-gateway
      GATEWAY_PORT: 5000
      GATEWAY_UPSTREAM_TIMEOUT_MS: ${GATEWAY_UPSTREAM_TIMEOUT_MS:-10000}
      AUTH_SERVICE_URL: http://auth-service:5101
      CATALOG_SERVICE_URL: http://catalog-service:5102
      BOOKING_SERVICE_URL: http://booking-service:5103
      CHECKIN_SERVICE_URL: http://checkin-service:5104
      NOTIFICATION_SERVICE_URL: http://notification-service:5105
      INTERNAL_HTTP_TIMEOUT_MS: ${INTERNAL_HTTP_TIMEOUT_MS:-5000}
      INTERNAL_HTTP_RETRIES: ${INTERNAL_HTTP_RETRIES:-1}
      INTERNAL_HTTP_RETRY_DELAY_MS: ${INTERNAL_HTTP_RETRY_DELAY_MS:-150}
      INTERNAL_HTTP_CIRCUIT_BREAKER_THRESHOLD: ${INTERNAL_HTTP_CIRCUIT_BREAKER_THRESHOLD:-5}
      INTERNAL_HTTP_CIRCUIT_BREAKER_COOLDOWN_MS: ${INTERNAL_HTTP_CIRCUIT_BREAKER_COOLDOWN_MS:-15000}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev_internal_key}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      - auth-service
      - catalog-service
      - booking-service
      - checkin-service
      - notification-service
    ports:
      - "5000:5000"

  seed-microservices:
    build:
      context: ./backend
    command: node scripts/seedMicroservices.js
    profiles:
      - tools
    environment:
      AUTH_MONGODB_URI: mongodb://auth-mongo:27017/ticket-auth?replicaSet=rs0
      CATALOG_MONGODB_URI: mongodb://catalog-mongo:27017/ticket-catalog?replicaSet=rs0
      BOOKING_MONGODB_URI: mongodb://booking-mongo:27017/ticket-booking?replicaSet=rs0
      CHECKIN_MONGODB_URI: mongodb://checkin-mongo:27017/ticket-checkin?replicaSet=rs0
      NOTIFICATION_MONGODB_URI: mongodb://notification-mongo:27017/ticket-notification?replicaSet=rs0
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ticketbooking.com}
      SECRET_HASH_KEY: ${SECRET_HASH_KEY:-dev_secret_hash_key_change_me}
      PASSWORD_HASH_ROUNDS: ${PASSWORD_HASH_ROUNDS:-12}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:-dev_password_pepper_change_me}
      MIN_PASSWORD_LENGTH: ${MIN_PASSWORD_LENGTH:-8}
    depends_on:
      - auth-mongo
      - catalog-mongo
      - booking-mongo
      - checkin-mongo
      - notification-mongo

volumes:
  rabbitmq-data:
  auth-mongo-data:
  catalog-mongo-data:
  booking-mongo-data:
  checkin-mongo-data:
  notification-mongo-data:
